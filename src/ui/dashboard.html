<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portr-rs Console</title>
    <style>
      :root {
        --background: #fafafa;
        --foreground: #0f172a;
        --muted: #f1f5f9;
        --muted-foreground: #64748b;
        --accent: #0052ff;
        --accent-secondary: #4d7cff;
        --border: #e2e8f0;
        --card: #ffffff;
        --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(77, 124, 255, 0.14), transparent 26rem),
          radial-gradient(circle at bottom left, rgba(0, 82, 255, 0.08), transparent 22rem),
          var(--background);
        color: var(--foreground);
      }
      .page { max-width: 1200px; margin: 0 auto; padding: 32px 20px 80px; }
      .topbar {
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
        flex-wrap:wrap;
        margin-bottom: 8px;
      }
      .topbar-stats {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .topbar-stat {
        display: flex;
        align-items: baseline;
        gap: 6px;
        font-size: 13px;
        color: var(--muted-foreground);
      }
      .topbar-stat strong {
        font-size: 1.1rem;
        color: var(--foreground);
        font-weight: 600;
      }
      .topbar-divider {
        width: 1px;
        height: 16px;
        background: var(--border);
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid rgba(0, 82, 255, 0.18);
        background: rgba(0, 82, 255, 0.06);
        color: var(--accent);
        border-radius: 999px;
        padding: 10px 14px;
        font: 12px/1 "JetBrains Mono", monospace;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
        box-shadow: 0 0 0 8px rgba(0, 82, 255, 0.1);
        animation: pulse 2.2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.7; }
      }
      h2 {
        font-family: Calistoga, Georgia, serif;
        font-weight: 400;
        margin: 0;
      }
      .gradient-text {
        background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
        margin-top: 28px;
      }
      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 22px;
        box-shadow: var(--shadow);
      }
      .stat-card small {
        display: block;
        color: var(--muted-foreground);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
      }
      .stat-card strong {
        font-size: 2rem;
        display: block;
        margin-top: 10px;
      }
      .section {
        margin-top: 42px;
      }
      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }
      .section-head p {
        margin: 0;
        color: var(--muted-foreground);
        max-width: 56ch;
      }
      .client-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
      }
      .client-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 22px;
        box-shadow: var(--shadow);
      }
      .client-top, .lease-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }
      .muted { color: var(--muted-foreground); }
      .refresh-note {
        color: var(--muted-foreground);
        font-size: 13px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid rgba(0, 82, 255, 0.15);
        background: rgba(0, 82, 255, 0.06);
        color: var(--accent);
      }
      .lease-list {
        margin-top: 18px;
        display: grid;
        gap: 12px;
      }
      .lease-row {
        background: var(--muted);
        border-radius: 18px;
        padding: 14px 16px;
      }
      .lease-row strong { font-size: 0.98rem; }
      .lease-meta, .token-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
        color: var(--muted-foreground);
        font-size: 13px;
      }

      /* ── Shares table (light) ── */
      .table-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 14px 16px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        font: 11px/1 "JetBrains Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted-foreground);
        background: var(--muted);
      }
      tbody tr {
        cursor: pointer;
        transition: background 0.15s;
      }
      tbody tr:last-child td { border-bottom: none; }
      tbody tr:hover { background: rgba(0, 82, 255, 0.03); }
      .token-value {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--foreground);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: var(--muted);
        color: var(--muted-foreground);
      }
      .badge--active {
        background: rgba(0, 82, 255, 0.08);
        color: var(--accent);
      }
      .row-arrow {
        color: var(--border);
        transition: color 0.15s, transform 0.15s;
        flex-shrink: 0;
      }
      tbody tr:hover .row-arrow {
        color: var(--accent);
        transform: translateX(2px);
      }

      /* ── Drawer ── */
      .drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.18);
        backdrop-filter: blur(2px);
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      .drawer-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }
      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(520px, 92vw);
        background: var(--card);
        border-left: 1px solid var(--border);
        box-shadow: -20px 0 60px rgba(15, 23, 42, 0.1);
        z-index: 101;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        flex-direction: column;
      }
      .drawer.open { transform: translateX(0); }
      .drawer-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        padding: 24px 24px 0;
        flex-shrink: 0;
      }
      .drawer-header h3 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
      }
      .drawer-header .token-meta { margin-top: 6px; }
      .drawer-close {
        appearance: none;
        border: none;
        background: var(--muted);
        border-radius: 12px;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--muted-foreground);
        font-size: 18px;
        transition: background 0.15s, color 0.15s;
        flex-shrink: 0;
      }
      .drawer-close:hover { background: var(--border); color: var(--foreground); }
      .drawer-summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .drawer-summary-item small {
        display: block;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted-foreground);
      }
      .drawer-summary-item strong {
        display: block;
        margin-top: 4px;
        font-size: 1.05rem;
      }
      .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px 32px;
      }
      .drawer-body h4 {
        margin: 0 0 12px;
        font-size: 13px;
        font-family: "JetBrains Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted-foreground);
      }
      .log-card {
        background: var(--muted);
        border-radius: 16px;
        padding: 14px 16px;
        margin-bottom: 10px;
      }
      .log-card:last-child { margin-bottom: 0; }
      .log-card-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .log-card-top strong { font-size: 0.95rem; }
      .log-tokens {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .log-token-item {
        font-size: 12px;
        color: var(--muted-foreground);
      }
      .log-token-item span {
        display: block;
        font-weight: 600;
        color: var(--foreground);
        font-size: 13px;
        margin-top: 1px;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        font-family: "JetBrains Mono", monospace;
      }
      .status-pill--ok { background: rgba(16,185,129,0.1); color: #059669; }
      .status-pill--err { background: rgba(239,68,68,0.1); color: #dc2626; }

      .empty {
        padding: 28px;
        border-radius: 22px;
        background: var(--muted);
        color: var(--muted-foreground);
      }
      @media (max-width: 980px) {
        .stats, .client-grid { grid-template-columns: 1fr; }
        .section-head { align-items: start; flex-direction: column; }
        .drawer-summary { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="topbar">
        <span class="eyebrow"><span class="dot"></span>portr-rs console</span>
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <div class="topbar-stats">
            <div class="topbar-stat">
              <strong id="mini-installations">0</strong> installations
            </div>
            <div class="topbar-divider"></div>
            <div class="topbar-stat">
              <strong id="mini-shares">0</strong> shares
            </div>
          </div>
          <span class="refresh-note">synced <span id="last-sync">n/a</span></span>
        </div>
      </div>

      <section class="stats" id="stats"></section>

      <section class="section">
        <div class="section-head">
          <div>
            <span class="eyebrow"><span class="dot"></span>clients</span>
            <h2>Connected installations</h2>
          </div>
          <p>Each card shows one registered client, its platform footprint, and the leases it has issued for active or historical share tunnels.</p>
        </div>
        <div class="client-grid" id="clients"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <span class="eyebrow"><span class="dot"></span>shares</span>
            <h2>Token intelligence</h2>
          </div>
        </div>
        <div class="table-card">
          <table>
            <thead>
              <tr>
                <th>Share</th>
                <th>Token</th>
                <th>Usage</th>
                <th>Status</th>
                <th>Route</th>
                <th style="width:32px"></th>
              </tr>
            </thead>
            <tbody id="shares"></tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- Drawer -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <div>
          <h3 id="drawer-title"></h3>
          <div class="token-meta" id="drawer-subtitle"></div>
        </div>
        <button class="drawer-close" id="drawer-close" aria-label="Close">&times;</button>
      </div>
      <div class="drawer-summary" id="drawer-summary"></div>
      <div class="drawer-body">
        <h4>Request logs</h4>
        <div id="drawer-logs"></div>
      </div>
    </aside>

    <script>
      let _sharesData = [];

      const formatTime = (value) => {
        if (!value) return "n/a";
        return new Date(value).toLocaleString();
      };

      const maskToken = (value) => {
        if (!value) return "n/a";
        if (value.length <= 8) return value;
        return `${value.slice(0, 4)}\u2022\u2022\u2022\u2022${value.slice(-4)}`;
      };

      const totalTokens = (item) =>
        (item.inputTokens || 0) +
        (item.outputTokens || 0) +
        (item.cacheReadTokens || 0) +
        (item.cacheCreationTokens || 0);

      const statItems = [
        ["Installations", "installations"],
        ["Tracked Shares", "shares"],
        ["Active Leases", "activeLeases"],
        ["Active Shares", "activeShares"],
      ];

      /* ── Drawer logic ── */
      const drawerOverlay = document.getElementById("drawer-overlay");
      const drawer = document.getElementById("drawer");
      const drawerClose = document.getElementById("drawer-close");

      function openDrawer(index) {
        const share = _sharesData[index];
        if (!share) return;

        document.getElementById("drawer-title").textContent = share.shareName;
        document.getElementById("drawer-subtitle").innerHTML =
          `<span>${share.appType}</span><span>${share.providerId || "no provider"}</span><span>${maskToken(share.shareToken)}</span>`;

        document.getElementById("drawer-summary").innerHTML = `
          <div class="drawer-summary-item">
            <small>Usage</small>
            <strong>${share.tokensUsed} / ${share.tokenLimit}</strong>
          </div>
          <div class="drawer-summary-item">
            <small>Requests</small>
            <strong>${share.requestsCount}</strong>
          </div>
          <div class="drawer-summary-item">
            <small>Status</small>
            <strong>${share.shareStatus}</strong>
          </div>
        `;

        const logs = share.recentRequests || [];
        document.getElementById("drawer-logs").innerHTML = logs.length ? logs.map((log) => `
          <div class="log-card">
            <div class="log-card-top">
              <div>
                <strong>${log.model || log.requestModel || "-"}</strong>
                <div class="token-meta" style="margin-top:4px">
                  <span>${log.providerName || log.providerId}</span>
                  <span>${formatTime((log.createdAt || 0) * 1000)}</span>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <span class="status-pill ${log.statusCode >= 200 && log.statusCode < 400 ? 'status-pill--ok' : 'status-pill--err'}">${log.statusCode}</span>
                <span style="font-size:12px;color:var(--muted-foreground)">${log.latencyMs}ms</span>
              </div>
            </div>
            <div class="log-tokens">
              <div class="log-token-item">Input<span>${log.inputTokens || 0}</span></div>
              <div class="log-token-item">Output<span>${log.outputTokens || 0}</span></div>
              <div class="log-token-item">Cache read<span>${log.cacheReadTokens || 0}</span></div>
              <div class="log-token-item">Cache create<span>${log.cacheCreationTokens || 0}</span></div>
              <div class="log-token-item">Total<span>${totalTokens(log)}</span></div>
            </div>
          </div>
        `).join("") : '<div class="empty">No request logs synced yet.</div>';

        drawer.classList.add("open");
        drawerOverlay.classList.add("open");
      }

      function closeDrawer() {
        drawer.classList.remove("open");
        drawerOverlay.classList.remove("open");
      }

      drawerOverlay.addEventListener("click", closeDrawer);
      drawerClose.addEventListener("click", closeDrawer);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDrawer();
      });

      /* ── Data fetch ── */
      async function boot() {
        const response = await fetch("/v1/dashboard");
        if (!response.ok) {
          throw new Error(`Failed to fetch dashboard data: ${response.status}`);
        }
        const data = await response.json();
        _sharesData = data.shares || [];

        document.getElementById("last-sync").textContent = formatTime(data.generatedAt);
        document.getElementById("mini-installations").textContent = data.stats.installations;
        document.getElementById("mini-shares").textContent = data.stats.shares;

        document.getElementById("stats").innerHTML = statItems.map(([label, key]) => `
          <article class="stat-card">
            <small>${label}</small>
            <strong>${data.stats[key]}</strong>
          </article>
        `).join("");

        const clients = document.getElementById("clients");
        clients.innerHTML = data.installations.length ? data.installations.map((item) => `
          <article class="client-card">
            <div class="client-top">
              <div>
                <h3 style="margin:0 0 6px;font-size:1.3rem">${item.platform}</h3>
                <div class="muted">v${item.appVersion}</div>
              </div>
              <span class="pill">${item.activeLeaseCount} active leases</span>
            </div>
            <div class="lease-meta">
              <span>ID ${item.id.slice(0, 8)}</span>
              <span>Created ${formatTime(item.createdAt)}</span>
              <span>Seen ${formatTime(item.lastSeenAt)}</span>
            </div>
            <div class="lease-list">
              ${(item.leases || []).slice(0, 4).map((lease) => `
                <div class="lease-row">
                  <div>
                    <strong>${lease.subdomain}</strong>
                    <div class="lease-meta">
                      <span>${lease.tunnelType}</span>
                      <span>Issued ${formatTime(lease.issuedAt)}</span>
                      <span>Expires ${formatTime(lease.expiresAt)}</span>
                    </div>
                  </div>
                  <span class="pill">${lease.isActive ? "active" : "expired"}</span>
                </div>
              `).join("") || '<div class="empty">No leases yet.</div>'}
            </div>
          </article>
        `).join("") : '<div class="empty">No installations have registered yet.</div>';

        const shares = document.getElementById("shares");
        shares.innerHTML = data.shares.length ? data.shares.map((share, i) => `
          <tr onclick="openDrawer(${i})">
            <td>
              <strong>${share.shareName}</strong>
              <div class="token-meta">
                <span>${share.appType}</span>
                <span>${share.providerId || "no provider"}</span>
              </div>
            </td>
            <td><span class="token-value">${maskToken(share.shareToken)}</span></td>
            <td>
              <strong>${share.tokensUsed} / ${share.tokenLimit}</strong>
              <div class="token-meta">
                <span>${share.requestsCount} requests</span>
              </div>
            </td>
            <td>
              <span class="badge ${share.shareStatus === 'active' ? 'badge--active' : ''}">${share.shareStatus}</span>
              <div class="token-meta">
                <span>${share.activeLeaseCount} active leases</span>
                <span>expires ${formatTime(share.expiresAt)}</span>
              </div>
            </td>
            <td>
              <strong>${share.latestSubdomain}</strong>
              <div class="token-meta">
                <span>installation ${share.installationId.slice(0, 8)}</span>
              </div>
            </td>
            <td><span class="row-arrow">&rsaquo;</span></td>
          </tr>
        `).join("") : '<tr><td colspan="6"><div class="empty">No share metadata uploaded yet.</div></td></tr>';
      }

      boot().catch((error) => {
        document.body.innerHTML += `<pre style="padding:20px;color:#b91c1c">${String(error)}</pre>`;
      });
      setInterval(() => {
        boot().catch((error) => console.error(error));
      }, 5000);
    </script>
  </body>
</html>
